name: Update Fertilizer Prices

on:
  schedule:
    # Run every Monday and Friday at 07:00 UTC (14:00 BKK)
    - cron: '0 7 * * 1,5'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-fert:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch Fertilizer Prices from MOC
        run: python scripts/fetch_fert_moc.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fert-data.js
          
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update provincial fertilizer prices (MOC)" && git push)
