name: Update Dam Water Levels

on:
  schedule:
    # รอบแรก  09:00 UTC (16:00 BKK) — รอให้ RID อัปเดตข้อมูลก่อน (เดิม 06:00 เร็วเกิน)
    # รอบสอง  11:00 UTC (18:00 BKK) — safety net กรณี RID อัปเดตช้า
    - cron: '0 9 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  update-dam:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch dam water levels (RID API)
        run: python scripts/fetch_dam_water.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dam-water.json
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "auto: update dam water levels (RID)" && \
             git pull --rebase origin main && git push)
