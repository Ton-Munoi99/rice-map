name: 🌾 Auto-Update OAE National Rice Prices

on:
  schedule:
    # ทุกวัน 07:00 น. เวลาไทย (UTC+7 = 00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:  # รันด้วยมือได้ผ่าน GitHub UI

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    name: Fetch OAE CKAN API & Update prices-live.json

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🔄 Fetch OAE prices
        run: python scripts/fetch_oae_prices.py

      - name: 📤 Commit & Push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices-live.json
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "🤖 Auto-update: OAE national prices $(date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push
          )
