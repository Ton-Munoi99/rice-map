name: Update TREA FOB Prices

on:
  schedule:
    # Run every Wednesday and Thursday at 06:00 UTC (13:00 BKK) to catch weekly updates
    - cron: '0 6 * * 3,4'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4

      - name: Fetch FOB Prices from TREA
        run: python scripts/fetch_trea_fob.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trea-fob.json
          
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update TREA FOB rice prices" && git push)
